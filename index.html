<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primero Misiones | Panel Fronterizo</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="widget">

    <header class="header">
        <h1>🔴 PRIMERO MISIONES | EN VIVO</h1>
    </header>

    <section class="clock">

        <div id="current-time" class="time">
            00:00:00
        </div>

        <div id="current-date" class="date">
            Cargando...
        </div>

    </section>

    <section class="weather-card">

        <h2>🌤 San Javier (Misiones)</h2>

        <div id="weather-temp" class="temperature">
            --°
        </div>

        <div id="weather-description" class="description">
            Cargando clima...
        </div>

        <div class="details">

            <div>
                💧 Humedad:
                <strong id="weather-humidity">--%</strong>
            </div>

            <div>
                💨 Viento:
                <strong id="weather-wind">-- km/h</strong>
            </div>

        </div>

    </section>

    <section class="buttons">

        <a class="btn"
           href="https://wa.me/543754405031"
           target="_blank">

            📲 Enviar noticia

        </a>

        <a class="btn secondary"
           href="https://whatsapp.com/channel/0029Vb8JtLeIXnljx0gy2C0v"
           target="_blank">

            📢 Canal de WhatsApp

        </a>

    </section>

    <footer class="footer">

        Panel Fronterizo • Primero Misiones

    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
