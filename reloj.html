<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Primero Misiones | Reloj</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    font-family:Arial,Helvetica,sans-serif;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#pm-widget{
    width:100%;
    max-width:420px;
    background:#000;
    color:#fff;
    border-radius:18px;
    overflow:hidden;
    border:1px solid #202020;
    box-shadow:0 8px 30px rgba(0,0,0,.45);
}

.topbar{
    background:#d50000;
    color:#fff;
    text-align:center;
    font-weight:700;
    font-size:15px;
    padding:10px 8px;
    letter-spacing:.5px;
}

.logo{
    background:#000;
    text-align:center;
    padding:18px 10px 10px;
}

.logo img{
    width:220px;
    max-width:90%;
    height:auto;
}

.reloj{
    text-align:center;
    padding:6px 15px 0;
}

#hora{
    font-size:64px;
    font-weight:700;
    line-height:1;
    letter-spacing:2px;
}

#fecha{
    margin-top:10px;
    color:#d0d0d0;
    font-size:18px;
}

.temp-card{
    margin:22px 18px 20px;
    background:#111;
    border:1px solid #2b2b2b;
    border-radius:14px;
    padding:18px;
    text-align:center;
}

.temp-title{
    font-size:14px;
    color:#bbbbbb;
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:1px;
}

#temperatura{
    font-size:36px;
    font-weight:bold;
}

#descripcion{
    margin-top:6px;
    color:#bbbbbb;
    font-size:15px;
}

@media (max-width:420px){

    #hora{
        font-size:56px;
    }

    #fecha{
        font-size:17px;
    }

    .logo img{
        width:190px;
    }

    .temp-card{
        margin:18px 14px;
    }

}
</style>
</head>

<body>

<div id="pm-widget">

    <div class="topbar">
        🔴 PRIMERO MISIONES | EN VIVO
    </div>

    <div class="logo">
        <img src="https://primeromisiones.info/static/custom/logo.webp?t=2026-07-15+03%3A00%3A30.213467" alt="Primero Misiones">
    </div>

    <div class="reloj">
        <div id="hora">00:00</div>
        <div id="fecha">Cargando fecha...</div>
    </div>

    <div class="temp-card">
        <div class="temp-title">San Javier · Misiones</div>
        <div id="temperatura">--°C</div>
        <div id="descripcion">Actualizando...</div>
    </div>

</div>

<script>
const LAT=-27.873;
const LON=-55.137;

function actualizarReloj(){

    const ahora=new Date();

    document.getElementById("hora").textContent=
        ahora.toLocaleTimeString("es-AR",{
            hour:"2-digit",
            minute:"2-digit"
        });

    document.getElementById("fecha").textContent=
        ahora.toLocaleDateString("es-AR",{
            weekday:"long",
            day:"numeric",
            month:"long",
            year:"numeric"
        });

}

actualizarReloj();
setInterval(actualizarReloj,1000);

function descripcionTiempo(code){

    const estados={
        0:"Despejado",
        1:"Mayormente despejado",
        2:"Parcialmente nublado",
        3:"Nublado",
        45:"Niebla",
        48:"Niebla",
        51:"Llovizna",
        53:"Llovizna",
        55:"Llovizna",
        61:"Lluvia",
        63:"Lluvia",
        65:"Lluvia intensa",
        71:"Nevadas",
        80:"Chaparrones",
        81:"Chaparrones",
        82:"Chaparrones fuertes",
        95:"Tormentas"
    };

    return estados[code] || "Sin datos";
}

async function cargarTemperatura(){

    try{

        const url=`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,weather_code`;

        const r=await fetch(url);
        const d=await r.json();

        document.getElementById("temperatura").textContent=
            Math.round(d.current.temperature_2m)+"°C";

        document.getElementById("descripcion").textContent=
            descripcionTiempo(d.current.weather_code);

    }catch(e){

        document.getElementById("temperatura").textContent="--°C";
        document.getElementById("descripcion").textContent="Sin conexión";

    }

}

cargarTemperatura();
setInterval(cargarTemperatura,600000);
</script>

</body>
</html>
